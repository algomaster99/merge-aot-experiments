name: Recursively Updating AOT Cache (tree)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  aot-cache:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download custom JDK
        uses: ./.github/actions/download-custom-jdk

      - name: Set up custom JDK
        uses: actions/setup-java@v4
        with:
          distribution: jdkfile
          java-version: '25'
          jdkFile: jdk-custom.tar.gz

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build modules
        working-directory: recursively-updating-aot-cache
        run: mvn package -q

      - name: Build AOT cache (combined)
        working-directory: recursively-updating-aot-cache
        run: ./orchestrate-combine.sh

      - name: Check AOT cache
        working-directory: recursively-updating-aot-cache
        run: |
          output=$(./check-aot-combine.sh 2>&1)
          echo "$output"
          {
            echo "## AOT Cache Check"
            echo '```'
            echo "$output" | sed 's/\x1B\[[0-9;]*m//g'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Performance check
        working-directory: recursively-updating-aot-cache
        run: |
          output=$(./performance-check-combine.sh 2>&1)
          echo "$output"
          {
            echo "## Performance Results"
            echo '```'
            echo "$output" | sed 's/\x1B\[[0-9;]*m//g'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

