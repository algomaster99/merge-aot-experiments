name: PDFBox AOT Cache (tree combine via orchestrate-combine-3)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  tree-combine:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download custom JDK
        uses: ./.github/actions/download-custom-jdk

      - name: Set up custom JDK
        uses: actions/setup-java@v4
        with:
          distribution: jdkfile
          java-version: '25'
          jdkFile: jdk-custom.tar.gz

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build PDFBox tools cache (tree-merge)
        working-directory: pdfbox-experiment/pdfbox
        run: |
          set -euo pipefail
          find . -name "*.aot" -type f -delete
          mvn package -q -Ptree-merge
          test -f tools/cache.aot
          test -f io/cache.aot
          test -f fontbox/cache.aot
          test -f xmpbox/cache.aot
          test -f pdfbox/cache.aot
          test -f preflight/cache.aot
          test -f examples/cache.aot

      - name: Build JBIG2 cache (tree-merge)
        working-directory: pdfbox-experiment/pdfbox-deps/pdfbox-jbig2
        run: |
          set -euo pipefail
          mvn clean test -Ptree-merge -q
          test -f cache.aot

      # TODO: add profile in commons io
      - name: Build Apache Commons IO cache (tree-merge)
        working-directory: pdfbox-experiment/pdfbox-deps/apache-commons-io
        run: |
          set -euo pipefail
          mvn clean test -q
          test -f cache.aot

      - name: Set up default JDK 25 (single.aot)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Capture Temurin java path
        run: echo "TEMURIN_JAVA_HOME=$JAVA_HOME" >> "$GITHUB_ENV"

      - name: Create single.aot (default JDK)
        working-directory: pdfbox-experiment
        run: |
          set -euo pipefail
          chmod +x create-single-aot.sh
          ./create-single-aot.sh
          test -f single.aot

      - name: Re-enable custom JDK
        uses: actions/setup-java@v4
        with:
          distribution: jdkfile
          java-version: '25'
          jdkFile: jdk-custom.tar.gz

      - name: Create tree.aot (orchestrate-combine-3.sh)
        working-directory: pdfbox-experiment
        run: |
          set -euo pipefail
          chmod +x orchestrate-combine-3.sh workload-timed.sh
          tree_out=$(./orchestrate-combine-3.sh 2>&1)
          echo "$tree_out"
          tree_out_clean=$(echo "$tree_out" | sed 's/\x1B\[[0-9;]*m//g')

          single_size=$(du -h single.aot | awk '{print $1}')
          tree_size=$(du -h tree.aot 2>/dev/null | awk '{print $1}' || echo "?")
          picocli_size=$(du -h picocli.aot 2>/dev/null | awk '{print $1}' || echo "?")

          {
            echo "## tree.aot creation (orchestrate-combine-3)"
            echo
            echo "- single.aot: ${single_size}"
            echo "- picocli.aot: ${picocli_size}"
            echo "- tree.aot: ${tree_size}"
            echo
            echo '```'
            echo "$tree_out_clean"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          test -f tree.aot
          
      - name: Run timed workload
        working-directory: pdfbox-experiment
        run: |
          set -euo pipefail
          wl_out=$(JAVA_NO_BIN="$TEMURIN_JAVA_HOME/bin/java" JAVA_SINGLE_BIN="$TEMURIN_JAVA_HOME/bin/java" JAVA_TREE_BIN="$JAVA_HOME/bin/java" ./workload-timed.sh 2>&1)
          echo "$wl_out"
          wl_out_clean=$(echo "$wl_out" | sed 's/\x1B\[[0-9;]*m//g')

          single_size=$(du -h single.aot | awk '{print $1}')
          tree_size=$(du -h tree.aot | awk '{print $1}')

          {
            echo "## Timed workload results (no-AOT vs single vs tree)"
            echo
            echo "- single.aot: ${single_size}"
            echo "- tree.aot: ${tree_size}"
            echo
            echo '```'
            echo "$wl_out_clean"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload PDFBox workload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdfbox-tree-artifacts
          path: |
            pdfbox-experiment/workload-tmp/
          if-no-files-found: error
