name: PDFBox Distributed AOT Cache

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  tree-combine:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Download custom JDK
        uses: ./.github/actions/download-custom-jdk

      - name: Set up custom JDK
        uses: actions/setup-java@v4
        with:
          distribution: jdkfile
          java-version: '25'
          jdkFile: jdk-custom.tar.gz

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build PDFBox tools cache (tree-merge)
        working-directory: pdfbox-experiment/pdfbox
        run: |
          set -euo pipefail
          find . -name "*.aot" -type f -delete
          mvn package -q -Ptree-merge
          test -f tools/cache.aot
          test -f io/cache.aot
          test -f fontbox/cache.aot
          test -f xmpbox/cache.aot
          test -f pdfbox/cache.aot

      - name: Build JBIG2 cache (tree-merge)
        working-directory: pdfbox-experiment/pdfbox-deps/pdfbox-jbig2
        run: |
          set -euo pipefail
          mvn clean test -Ptree-merge -q
          test -f cache.aot

      # TODO: add profile in commons io
      - name: Build Apache Commons IO cache (tree-merge)
        working-directory: pdfbox-experiment/pdfbox-deps/apache-commons-io
        run: |
          set -euo pipefail
          mvn clean test -q
          test -f cache.aot

      - name: Build workload jars for missing dependency caches
        working-directory: pdfbox-experiment
        run: |
          set -euo pipefail

          workloads=(
            pdfbox-deps/commons-logging-workload
            pdfbox-deps/bc-java-prov-workload
            pdfbox-deps/bc-java-util-workload
            pdfbox-deps/bc-java-pkix-workload
          )

          for workload in "${workloads[@]}"; do
            echo "Building $workload"
            (cd "$workload" && mvn -q clean package)
          done

      - name: Record workload-based AOT caches
        working-directory: pdfbox-experiment
        run: |
          set -euo pipefail
          rm -f \
            pdfbox-deps/commons-logging-workload/cache.aot \
            pdfbox-deps/bc-java-prov-workload/cache.aot \
            pdfbox-deps/bc-java-util-workload/cache.aot \
            pdfbox-deps/bc-java-pkix-workload/cache.aot

          java -XX:AOTCacheOutput=pdfbox-deps/commons-logging-workload/cache.aot \
            -jar pdfbox-deps/commons-logging-workload/target/commons-logging-workload-1.0-SNAPSHOT.jar
          java -XX:AOTCacheOutput=pdfbox-deps/bc-java-prov-workload/cache.aot \
            -jar pdfbox-deps/bc-java-prov-workload/target/bc-java-prov-workload-1.0-SNAPSHOT.jar
          java -XX:AOTCacheOutput=pdfbox-deps/bc-java-util-workload/cache.aot \
            -jar pdfbox-deps/bc-java-util-workload/target/bc-java-util-workload-1.0-SNAPSHOT.jar
          java -XX:AOTCacheOutput=pdfbox-deps/bc-java-pkix-workload/cache.aot \
            -jar pdfbox-deps/bc-java-pkix-workload/target/bc-java-pkix-workload-1.0-SNAPSHOT.jar

          test -f pdfbox-deps/commons-logging-workload/cache.aot
          test -f pdfbox-deps/bc-java-prov-workload/cache.aot
          test -f pdfbox-deps/bc-java-util-workload/cache.aot
          test -f pdfbox-deps/bc-java-pkix-workload/cache.aot

      - name: Set up default JDK 25 (single.aot and baseline workload)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Capture Temurin java path
        run: echo "TEMURIN_JAVA_HOME=$JAVA_HOME" >> "$GITHUB_ENV"

      - name: Create single.aot (default JDK)
        working-directory: pdfbox-experiment
        run: |
          set -euo pipefail
          chmod +x create-single-aot.sh
          ./create-single-aot.sh
          test -f single.aot

      - name: Re-enable custom JDK
        uses: actions/setup-java@v4
        with:
          distribution: jdkfile
          java-version: '25'
          jdkFile: jdk-custom.tar.gz

      - name: Create tree.aot (orchestrate-combine-4.sh)
        working-directory: pdfbox-experiment
        run: |
          set -euo pipefail
          chmod +x orchestrate-combine-4.sh
          tree_out=$(./orchestrate-combine-4.sh 2>&1)
          echo "$tree_out"
          tree_out_clean=$(echo "$tree_out" | sed 's/\x1B\[[0-9;]*m//g')

          tree_size=$(du -h tree.aot | awk '{print $1}')

          {
            echo "## tree.aot creation (orchestrate-combine-4)"
            echo
            echo "- tree.aot: ${tree_size}"
            echo
            echo '```'
            echo "$tree_out_clean"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          test -f tree.aot

      - name: Verify merged AOT cache coverage
        working-directory: pdfbox-experiment
        run: |
          set -euo pipefail
          chmod +x check-aot-full.sh
          check_out=$(./check-aot-full.sh 2>&1)
          echo "$check_out"
          check_out_clean=$(echo "$check_out" | sed 's/\x1B\[[0-9;]*m//g')

          tree_size=$(du -h tree.aot | awk '{print $1}')

          {
            echo "## AOT verification (check-aot-full.sh)"
            echo
            echo "- tree.aot: ${tree_size}"
            echo
            echo '```'
            echo "$check_out_clean"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # TODO: this is not implemented yet
      # - name: Populate local Maven repo with JAR, POM, and AOT artifacts
      #   working-directory: pdfbox-experiment
      #   run: |
      #     set -euo pipefail
      #     chmod +x build-m2.sh
      #     ./build-m2.sh
      #     test -f local-repo/org/apache/pdfbox/pdfbox/3.0.7/pdfbox-3.0.7.aot
      #     test -f local-repo/commons-logging/commons-logging/1.3.5/commons-logging-1.3.5.aot
      #     test -f local-repo/org/bouncycastle/bcprov-jdk18on/1.83/bcprov-jdk18on-1.83.aot

      - name: Run timed workload
        working-directory: pdfbox-experiment
        run: |
          set -euo pipefail
          chmod +x workload-timed.sh
          wl_out=$(JAVA_NO_BIN="$TEMURIN_JAVA_HOME/bin/java" JAVA_SINGLE_BIN="$TEMURIN_JAVA_HOME/bin/java" JAVA_TREE_BIN="$JAVA_HOME/bin/java" ./workload-timed.sh 2>&1)
          echo "$wl_out"
          wl_out_clean=$(echo "$wl_out" | sed 's/\x1B\[[0-9;]*m//g')

          single_size=$(du -h single.aot | awk '{print $1}')
          tree_size=$(du -h tree.aot | awk '{print $1}')

          {
            echo "## Timed workload results (no-AOT vs single vs tree)"
            echo
            echo "- single.aot: ${single_size}"
            echo "- tree.aot: ${tree_size}"
            echo
            echo '```'
            echo "$wl_out_clean"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Write artifact summary
        working-directory: pdfbox-experiment
        run: |
          set -euo pipefail

          {
            echo "## Distributed AOT artifact summary"
            echo
            echo "| Artifact | Cache path | Size |"
            echo "|---|---|---|"
            echo "| io | \`pdfbox/io/cache.aot\` | $(du -h pdfbox/io/cache.aot | awk '{print $1}') |"
            echo "| fontbox | \`pdfbox/fontbox/cache.aot\` | $(du -h pdfbox/fontbox/cache.aot | awk '{print $1}') |"
            echo "| xmpbox | \`pdfbox/xmpbox/cache.aot\` | $(du -h pdfbox/xmpbox/cache.aot | awk '{print $1}') |"
            echo "| pdfbox | \`pdfbox/pdfbox/cache.aot\` | $(du -h pdfbox/pdfbox/cache.aot | awk '{print $1}') |"
            echo "| tools | \`pdfbox/tools/cache.aot\` | $(du -h pdfbox/tools/cache.aot | awk '{print $1}') |"
            echo "| pdfbox-jbig2 | \`pdfbox-deps/pdfbox-jbig2/cache.aot\` | $(du -h pdfbox-deps/pdfbox-jbig2/cache.aot | awk '{print $1}') |"
            echo "| apache-commons-io | \`pdfbox-deps/apache-commons-io/cache.aot\` | $(du -h pdfbox-deps/apache-commons-io/cache.aot | awk '{print $1}') |"
            echo "| commons-logging-workload | \`pdfbox-deps/commons-logging-workload/cache.aot\` | $(du -h pdfbox-deps/commons-logging-workload/cache.aot | awk '{print $1}') |"
            echo "| bc-java-prov-workload | \`pdfbox-deps/bc-java-prov-workload/cache.aot\` | $(du -h pdfbox-deps/bc-java-prov-workload/cache.aot | awk '{print $1}') |"
            echo "| bc-java-util-workload | \`pdfbox-deps/bc-java-util-workload/cache.aot\` | $(du -h pdfbox-deps/bc-java-util-workload/cache.aot | awk '{print $1}') |"
            echo "| bc-java-pkix-workload | \`pdfbox-deps/bc-java-pkix-workload/cache.aot\` | $(du -h pdfbox-deps/bc-java-pkix-workload/cache.aot | awk '{print $1}') |"
            echo "| single | \`single.aot\` | $(du -h single.aot | awk '{print $1}') |"
            echo "| tree | \`tree.aot\` | $(du -h tree.aot | awk '{print $1}') |"
            echo
            echo "- local-repo entries: $(find local-repo -type f | wc -l | tr -d ' ')"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload PDFBox workload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdfbox-tree-artifacts
          path: |
            pdfbox-experiment/workload-tmp/
            pdfbox-experiment/single.aot
            pdfbox-experiment/tree.aot
            pdfbox-experiment/local-repo/
            pdfbox-experiment/pdfbox/io/cache.aot
            pdfbox-experiment/pdfbox/fontbox/cache.aot
            pdfbox-experiment/pdfbox/xmpbox/cache.aot
            pdfbox-experiment/pdfbox/pdfbox/cache.aot
            pdfbox-experiment/pdfbox/tools/cache.aot
            pdfbox-experiment/pdfbox-deps/pdfbox-jbig2/cache.aot
            pdfbox-experiment/pdfbox-deps/apache-commons-io/cache.aot
            pdfbox-experiment/pdfbox-deps/commons-logging-workload/cache.aot
            pdfbox-experiment/pdfbox-deps/bc-java-prov-workload/cache.aot
            pdfbox-experiment/pdfbox-deps/bc-java-util-workload/cache.aot
            pdfbox-experiment/pdfbox-deps/bc-java-pkix-workload/cache.aot
          if-no-files-found: error
